<!DOCTYPE html>
<html>
<head>
  <title>Players</title>
  <script src="card-modal.js"></script>
  <style>
    body{background:#07101d;color:white;font-family:sans-serif}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:20px}
    .card{background:#101b2d;padding:12px;border-radius:12px;cursor:pointer}
  </style>
</head>
<body>

<h2 id="title" style="padding:20px">Loading...</h2>
<div id="grid" class="grid"></div>

<script>
let cards = [];

fetch('data/showfield_data.json?v='+Date.now())
.then(r=>r.json())
.then(data=>{
  cards = data.cards || [];

  document.getElementById('title').innerText =
    `Players (${cards.length.toLocaleString()})`;

  render(cards);
});

function render(list){
  document.getElementById('grid').innerHTML = list.slice(0,500).map((c,i)=>`
    <div class="card" onclick="openCardModal(cards[${i}])">
      <b>${c.name}</b><br>
      ${c.ovr} OVR · ${c.display_position}<br>
      ${c.team_short}
    </div>
  `).join('');
}
</script>

</body>
</html>
