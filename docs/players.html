<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ShowField Players</title>
  <style>
    :root{
      --bg:#07111f;
      --panel:#0d1b2e;
      --panel2:#12243b;
      --text:#f4f7fb;
      --muted:#9fb0c7;
      --line:rgba(255,255,255,.08);
      --gold:#f5c84b;
      --green:#28d17c;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    .wrap{
      width:min(1200px,100%);
      margin:0 auto;
      padding:18px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }

    .brand{
      font-size:24px;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .home{
      color:var(--muted);
      text-decoration:none;
      font-weight:700;
      font-size:14px;
    }

    .hero{
      background:linear-gradient(135deg,#102544,#091524);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      margin-bottom:16px;
    }

    h1{
      margin:0 0 6px;
      font-size:28px;
      letter-spacing:-.04em;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
    }

    .controls{
      display:grid;
      grid-template-columns:2fr 1fr 1fr 1fr;
      gap:10px;
      margin-top:16px;
    }

    input,select{
      width:100%;
      background:#081423;
      border:1px solid var(--line);
      color:var(--text);
      border-radius:14px;
      padding:12px;
      font-size:15px;
      outline:none;
    }

    .stats{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:14px 0 18px;
    }

    .pill{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .tier{
      margin:24px 0 12px;
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:10px;
    }

    .tier h2{
      margin:0;
      font-size:20px;
      letter-spacing:-.03em;
    }

    .tier span{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      display:grid;
      gap:10px;
    }

    .cardTop{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }

    .name{
      font-size:16px;
      font-weight:900;
      line-height:1.15;
    }

    .meta{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
      font-weight:700;
    }

    .ovr{
      min-width:50px;
      text-align:center;
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:7px 8px;
      font-weight:950;
      font-size:19px;
    }

    .ovr small{
      display:block;
      font-size:10px;
      color:var(--muted);
      letter-spacing:.08em;
    }

    .attr{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:7px;
    }

    .box{
      background:#081423;
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 6px;
      text-align:center;
    }

    .box b{
      display:block;
      font-size:15px;
    }

    .box small{
      color:var(--muted);
      font-size:10px;
      font-weight:800;
      letter-spacing:.05em;
    }

    .empty{
      color:var(--muted);
      padding:30px 0;
      text-align:center;
    }

    @media(max-width:850px){
      .controls{
        grid-template-columns:1fr 1fr;
      }

      .controls input{
        grid-column:1 / -1;
      }

      .grid{
        grid-template-columns:1fr;
      }

      .wrap{
        padding:14px;
      }

      .hero{
        padding:15px;
      }

      h1{
        font-size:24px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="topbar">
      <div class="brand">ShowField</div>
      <a class="home" href="./index.html">← Dashboard</a>
    </div>

    <section class="hero">
      <h1>Players</h1>
      <div class="sub" id="subtitle">Loading player database…</div>

      <div class="controls">
        <input id="search" placeholder="Search player, team, series…" />

        <select id="sort">
          <option value="ovr">Sort: Overall</option>
          <option value="power">Sort: Power</option>
          <option value="contact">Sort: Contact</option>
          <option value="speed">Sort: Speed</option>
          <option value="fielding">Sort: Fielding</option>
          <option value="vision">Sort: Vision</option>
          <option value="name">Sort: Name</option>
        </select>

        <select id="position">
          <option value="">All Positions</option>
        </select>

        <select id="team">
          <option value="">All Teams</option>
        </select>
      </div>
    </section>

    <div class="stats" id="stats"></div>
    <section id="results"></section>
  </main>

  <script>
    const DATA_URL = "./data/show_cards_latest.json";

    let players = [];

    const $ = id => document.getElementById(id);

    function num(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function text(v){
      return v === null || v === undefined || v === "" ? "—" : String(v);
    }

    function attr(player, names){
      for(const name of names){
        if(player[name] !== undefined && player[name] !== null && player[name] !== ""){
          return num(player[name]);
        }
      }
      return 0;
    }

    function getPower(p){
      return Math.max(
        attr(p, ["power_left","pow_l","power_l","pwr_l"]),
        attr(p, ["power_right","pow_r","power_r","pwr_r"]),
        attr(p, ["power"])
      );
    }

    function getContact(p){
      return Math.max(
        attr(p, ["contact_left","con_l","contact_l"]),
        attr(p, ["contact_right","con_r","contact_r"]),
        attr(p, ["contact"])
      );
    }

    function getSpeed(p){
      return attr(p, ["speed","spd"]);
    }

    function getFielding(p){
      return attr(p, ["fielding","fld"]);
    }

    function getVision(p){
      return attr(p, ["vision","vis"]);
    }

    function getPosition(p){
      return text(p.display_position || p.position || p.primary_position);
    }

    function getTeam(p){
      return text(p.team_short || p.team || p.team_name);
    }

    function getSeries(p){
      return text(p.series || p.rarity || "");
    }

    function getSortValue(p, key){
      if(key === "power") return getPower(p);
      if(key === "contact") return getContact(p);
      if(key === "speed") return getSpeed(p);
      if(key === "fielding") return getFielding(p);
      if(key === "vision") return getVision(p);
      if(key === "name") return text(p.name).toLowerCase();
      return num(p.ovr || p.overall);
    }

    function tierName(ovr){
      if(ovr >= 95) return "Elite 95–99";
      if(ovr >= 90) return "Diamond 90–94";
      if(ovr >= 85) return "High Gold 85–89";
      if(ovr >= 80) return "Gold 80–84";
      if(ovr >= 70) return "Silver/Bronze 70–79";
      return "Common Below 70";
    }

    function populateFilters(){
      const positions = [...new Set(players.map(getPosition).filter(v => v !== "—"))].sort();
      const teams = [...new Set(players.map(getTeam).filter(v => v !== "—"))].sort();

      $("position").innerHTML = `<option value="">All Positions</option>` +
        positions.map(v => `<option value="${v}">${v}</option>`).join("");

      $("team").innerHTML = `<option value="">All Teams</option>` +
        teams.map(v => `<option value="${v}">${v}</option>`).join("");
    }

    function playerCard(p){
      const ovr = num(p.ovr || p.overall);
      const pos = getPosition(p);
      const team = getTeam(p);
      const series = getSeries(p);

      return `
        <article class="card">
          <div class="cardTop">
            <div>
              <div class="name">${text(p.name)}</div>
              <div class="meta">${team} • ${pos}${series && series !== "—" ? " • " + series : ""}</div>
            </div>
            <div class="ovr">${ovr}<small>OVR</small></div>
          </div>

          <div class="attr">
            <div class="box"><b>${getContact(p) || "—"}</b><small>CON</small></div>
            <div class="box"><b>${getPower(p) || "—"}</b><small>POW</small></div>
            <div class="box"><b>${getSpeed(p) || "—"}</b><small>SPD</small></div>
            <div class="box"><b>${getFielding(p) || "—"}</b><small>FLD</small></div>
          </div>
        </article>
      `;
    }

    function render(){
      const q = $("search").value.trim().toLowerCase();
      const sortKey = $("sort").value;
      const pos = $("position").value;
      const team = $("team").value;

      let filtered = players.filter(p => {
        const haystack = [
          p.name,
          getTeam(p),
          getPosition(p),
          getSeries(p),
          p.rarity
        ].join(" ").toLowerCase();

        return (!q || haystack.includes(q)) &&
               (!pos || getPosition(p) === pos) &&
               (!team || getTeam(p) === team);
      });

      filtered.sort((a,b) => {
        const av = getSortValue(a, sortKey);
        const bv = getSortValue(b, sortKey);

        if(sortKey === "name"){
          return av.localeCompare(bv);
        }

        return bv - av;
      });

      $("subtitle").textContent = `${filtered.length.toLocaleString()} of ${players.length.toLocaleString()} players shown`;

      $("stats").innerHTML = `
        <div class="pill">Total: ${players.length.toLocaleString()}</div>
        <div class="pill">Shown: ${filtered.length.toLocaleString()}</div>
        <div class="pill">Sorted by: ${$("sort").selectedOptions[0].text.replace("Sort: ","")}</div>
      `;

      const groups = {};
      for(const p of filtered){
        const key = tierName(num(p.ovr || p.overall));
        if(!groups[key]) groups[key] = [];
        groups[key].push(p);
      }

      const order = [
        "Elite 95–99",
        "Diamond 90–94",
        "High Gold 85–89",
        "Gold 80–84",
        "Silver/Bronze 70–79",
        "Common Below 70"
      ];

      let html = "";

      for(const key of order){
        const group = groups[key];
        if(!group || !group.length) continue;

        html += `
          <div class="tier">
            <h2>${key}</h2>
            <span>${group.length.toLocaleString()} players</span>
          </div>
          <div class="grid">
            ${group.map(playerCard).join("")}
          </div>
        `;
      }

      $("results").innerHTML = html || `<div class="empty">No players match those filters.</div>`;
    }

    async function init(){
      try{
        const res = await fetch(DATA_URL, { cache: "no-store" });
        if(!res.ok) throw new Error(`Could not load ${DATA_URL}`);

        players = await res.json();

        players = players.filter(p => p && p.name);

        populateFilters();
        render();

        ["search","sort","position","team"].forEach(id => {
          $(id).addEventListener("input", render);
          $(id).addEventListener("change", render);
        });
      }catch(err){
        $("subtitle").textContent = "Could not load player data.";
        $("results").innerHTML = `<div class="empty">${err.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
