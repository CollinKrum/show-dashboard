<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ShowField Team Builder</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root{--bg:#07101d;--panel:#101b2d;--panel2:#14243b;--line:#263957;--text:#edf4ff;--muted:#9fb2cd;--accent:#56b6ff;--green:#78f0a3;--gold:#ffd56a;--red:#ff7b7b;--radius:18px}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#07101d,#0b1424);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}a{color:inherit;text-decoration:none}.wrap{max-width:1200px;margin:0 auto;padding:18px}.top{position:sticky;top:0;z-index:10;background:rgba(7,16,29,.88);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.07)}.top-inner{max-width:1200px;margin:0 auto;padding:14px 18px;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:12px;font-weight:900}.badge{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#7d88ff);display:grid;place-items:center}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav a{padding:9px 12px;border-radius:12px;background:rgba(255,255,255,.06);color:var(--muted)}.nav a:hover{color:var(--text);background:rgba(255,255,255,.1)}
    .hero,.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);box-shadow:0 12px 32px rgba(0,0,0,.28)}.hero{margin-top:18px;padding:20px}h1{margin:0 0 8px;font-size:clamp(1.7rem,4vw,2.5rem)}p{color:var(--muted);line-height:1.5}.status{margin-top:12px;color:var(--muted);font-size:.95rem}.grid{display:grid;grid-template-columns:.85fr 1.15fr;gap:16px;margin-top:16px}.panel{padding:16px}.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}input,select,button{font:inherit;border-radius:12px;border:1px solid var(--line);background:#0d1728;color:var(--text);padding:10px 12px}button{cursor:pointer;background:rgba(86,182,255,.12)}button:hover{filter:brightness(1.15)}.slots{display:grid;gap:10px}.slot{display:grid;grid-template-columns:64px 1fr auto;gap:10px;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:10px}.pos{font-weight:900;color:var(--gold)}.name{font-weight:800}.muted{color:var(--muted);font-size:.88rem}.score{font-weight:900;color:var(--green)}.list{display:grid;gap:10px;max-height:720px;overflow:auto;padding-right:4px}.card{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:11px}.pill{display:inline-block;margin-top:4px;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.06);color:var(--muted);font-size:.78rem}.empty{padding:18px;text-align:center;color:var(--muted)}.totals{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.total{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px}.total b{font-size:1.25rem}.total span{display:block;color:var(--muted);font-size:.82rem;margin-top:3px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr 1fr}}@media(max-width:540px){.wrap{padding:14px}.panel,.hero{padding:14px}.toolbar,.totals{grid-template-columns:1fr}.slot{grid-template-columns:1fr}.slot button{width:100%}}
  </style>
</head>
<body>
  <div class="top"><div class="top-inner"><div class="brand"><div class="badge">SF</div><div>ShowField Team Builder</div></div><div class="nav"><a href="index.html">Dashboard</a><a href="players.html">Players</a><a href="market.html">Market</a></div></div></div>
  <main class="wrap">
    <section class="hero"><h1>Simple Lineup Builder</h1><p>Pick cards by position and let the page rank good fits. This is intentionally dumbed down: less magic, more usable.</p><div id="status" class="status">Loading cards…</div></section>
    <div class="grid">
      <section class="panel"><h2 style="margin-top:0">Your Lineup</h2><div class="totals"><div class="total"><b id="avgOvr">--</b><span>Avg OVR</span></div><div class="total"><b id="teamSpeed">--</b><span>Speed</span></div><div class="total"><b id="teamPower">--</b><span>Power</span></div></div><div id="slots" class="slots"></div><button id="clear" style="width:100%;margin-top:12px">Clear lineup</button></section>
      <section class="panel"><h2 style="margin-top:0">Available Cards</h2><div class="toolbar"><input id="search" placeholder="Search player/team/series…"><select id="position"><option value="">All positions</option></select><select id="sort"><option value="fit">Best fit</option><option value="ovr">OVR</option><option value="power">Power</option><option value="speed">Speed</option><option value="defense">Defense</option></select><select id="rarity"><option value="">All rarity</option></select></div><div id="list" class="list"><div class="empty">Loading…</div></div></section>
    </div>
  </main>
  <script>
    const positions=['C','1B','2B','3B','SS','LF','CF','RF','SP','RP','CP']; const paths=['data/show_dataset_latest.json','data/show_cards_latest.json','data/show_dataset_latest.csv','data/show_cards_latest.csv'];
    let cards=[],filtered=[],lineup=JSON.parse(localStorage.getItem('sf_lineup')||'{}'); const $=id=>document.getElementById(id); const clean=v=>(v==null||v==='nan'||v==='NaN')?'':String(v); const num=v=>{const n=Number(String(v??'').replace(/,/g,''));return Number.isFinite(n)?n:0};
    function pick(r,n){for(const k of n){if(r[k]!=null&&r[k]!=='')return r[k]}return ''} function norm(r){const cl=num(pick(r,['contact_l'])),cr=num(pick(r,['contact_r'])),pl=num(pick(r,['power_l'])),pr=num(pick(r,['power_r']));return{name:clean(pick(r,['name','player_name','card_name'])),ovr:num(pick(r,['ovr','overall','rating'])),pos:clean(pick(r,['display_position','position','pos'])),team:clean(pick(r,['team_short','team'])),series:clean(pick(r,['series'])),rarity:clean(pick(r,['rarity'])),speed:num(pick(r,['speed'])),fielding:num(pick(r,['fielding','fielding_ability'])),power:Math.round((pl+pr)/2),contact:Math.round((cl+cr)/2)}}
    async function load(){for(const p of paths){try{const res=await fetch(p+'?v='+Date.now());if(!res.ok)continue;const text=await res.text();if(!text.trim())continue;let raw=p.endsWith('.json')?JSON.parse(text):Papa.parse(text,{header:true,skipEmptyLines:true}).data;raw=Array.isArray(raw)?raw:(raw.data||raw.rows||raw.cards||[]);const out=raw.map(norm).filter(c=>c.name);if(out.length){cards=out;$('status').textContent=`Loaded ${out.length.toLocaleString()} cards from ${p}`;return}}catch(e){console.warn(e)}}$('status').innerHTML='No cards loaded. The page is fixed, but <code>docs/data</code> needs real generated data.'}
    function fill(){const pos=[...new Set(cards.map(c=>c.pos).filter(Boolean))].sort();$('position').innerHTML='<option value="">All positions</option>'+pos.map(v=>`<option>${esc(v)}</option>`).join('');const rar=[...new Set(cards.map(c=>c.rarity).filter(Boolean))].sort();$('rarity').innerHTML='<option value="">All rarity</option>'+rar.map(v=>`<option>${esc(v)}</option>`).join('')}
    function canPlay(c,pos){if(pos==='RP')return c.pos==='RP'||c.pos==='CP'; if(pos==='CP')return c.pos==='CP'||c.pos==='RP'; return c.pos===pos}
    function fitScore(c,pos){let s=c.ovr*2+c.contact+c.power+c.speed+c.fielding; if(canPlay(c,pos))s+=80; if(['LF','CF','RF'].includes(pos))s+=c.speed+c.fielding; if(['SS','2B','3B','CF'].includes(pos))s+=c.fielding; if(['1B','LF','RF'].includes(pos))s+=c.power; if(['SP','RP','CP'].includes(pos))s=c.ovr*3; return s}
    function apply(){const q=$('search').value.toLowerCase().trim(),pos=$('position').value,rar=$('rarity').value,sort=$('sort').value;filtered=cards.filter(c=>(!q||[c.name,c.team,c.series,c.rarity,c.pos].join(' ').toLowerCase().includes(q))&&(!pos||canPlay(c,pos)||c.pos===pos)&&(!rar||c.rarity===rar));filtered.sort((a,b)=>{if(sort==='ovr')return b.ovr-a.ovr;if(sort==='power')return b.power-a.power;if(sort==='speed')return b.speed-a.speed;if(sort==='defense')return b.fielding-a.fielding;return fitScore(b,pos||b.pos)-fitScore(a,pos||a.pos)});renderList();}
    function renderSlots(){const slotHtml=positions.map(p=>{const c=lineup[p];return `<div class="slot"><div class="pos">${p}</div><div>${c?`<div class="name">${esc(c.name)}</div><div class="muted">${esc(c.pos)} · ${c.ovr} OVR · ${esc(c.series)}</div>`:'<div class="muted">Empty</div>'}</div><button onclick="selectFor('${p}')">${c?'Swap':'Pick'}</button></div>`}).join('');$('slots').innerHTML=slotHtml;const vals=Object.values(lineup);const avg=arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0;$('avgOvr').textContent=avg(vals.map(c=>c.ovr))||'--';$('teamSpeed').textContent=avg(vals.map(c=>c.speed))||'--';$('teamPower').textContent=avg(vals.map(c=>c.power))||'--';localStorage.setItem('sf_lineup',JSON.stringify(lineup))}
    function selectFor(p){$('position').value=p;apply();window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})}
    function addTo(pos,i){lineup[pos]=filtered[i];renderSlots()}
    function renderList(){const pos=$('position').value;const show=filtered.slice(0,250);$('list').innerHTML=show.length?show.map((c,i)=>`<div class="card"><div><div class="name">${esc(c.name)} <span class="score">${c.ovr}</span></div><div class="muted">${esc(c.pos)} · ${esc(c.team)} · ${esc(c.series)}</div><span class="pill">PWR ${c.power}</span> <span class="pill">SPD ${c.speed}</span> <span class="pill">DEF ${c.fielding}</span></div><button onclick="addTo('${pos||c.pos}',${i})">Add</button></div>`).join(''):'<div class="empty">No cards match.</div>'}
    function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
    ['search','position','sort','rarity'].forEach(id=>$(id).addEventListener('input',apply));$('clear').onclick=()=>{lineup={};renderSlots()};load().then(()=>{fill();renderSlots();apply()});
  </script>
</body>
</html>
