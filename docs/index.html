<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MLB The Show 26 Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #141a2e;
      --panel-2: #1a223b;
      --text: #eef2ff;
      --muted: #a8b0cc;
      --line: #2c365d;
      --accent: #60a5fa;
      --good: #22c55e;
      --bad: #ef4444;
      --warn: #f59e0b;
      --shadow: 0 10px 30px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #0a0f1d, #11182c 30%, #0b1020);
      color: var(--text);
    }
    a { color: inherit; }
    .wrap { max-width: 1500px; margin: 0 auto; padding: 20px; }
    .hero {
      display: flex; justify-content: space-between; gap: 16px; align-items: center;
      padding: 22px; border: 1px solid var(--line); border-radius: 24px;
      background: rgba(20,26,46,.9); box-shadow: var(--shadow);
      position: sticky; top: 0; backdrop-filter: blur(10px); z-index: 20;
    }
    .hero h1 { margin: 0 0 6px; font-size: clamp(1.4rem, 2vw, 2.2rem); }
    .hero p { margin: 0; color: var(--muted); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border: 1px solid var(--line); border-radius: 999px; padding: 10px 14px;
      background: #1b2441; color: var(--text); text-decoration: none; cursor: pointer;
      font-weight: 600;
    }
    .btn:hover { border-color: var(--accent); }
    .btn.primary { background: linear-gradient(180deg, #2563eb, #1d4ed8); border-color: #2563eb; }
    .grid2 { display: grid; gap: 16px; grid-template-columns: 1.4fr .9fr; margin-top: 18px; }
    .panel {
      background: rgba(20,26,46,.92); border: 1px solid var(--line);
      border-radius: 24px; box-shadow: var(--shadow);
    }
    .controls { padding: 16px; }
    .controls-grid {
      display: grid; gap: 12px;
      grid-template-columns: 2fr repeat(7, 1fr);
      align-items: end;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .field label {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--muted);
      padding-left: 2px;
    }
    input, select {
      width: 100%; padding: 11px 12px; border-radius: 14px;
      border: 1px solid var(--line); background: var(--panel-2); color: var(--text);
    }
    .checks { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 12px; color: var(--muted); }
    .checks label { display:flex; align-items:center; gap:8px; }
    .stats {
      display: grid; gap: 12px; grid-template-columns: repeat(6, 1fr);
      padding: 16px;
    }
    .stat {
      padding: 14px; border-radius: 18px; background: #10172b; border: 1px solid var(--line);
    }
    .stat .k { color: var(--muted); font-size: .86rem; }
    .stat .v { font-size: 1.4rem; font-weight: 800; margin-top: 6px; }
    .table-wrap { padding: 0 16px 16px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 1180px; }
    th, td { padding: 11px 10px; border-bottom: 1px solid rgba(168,176,204,.12); text-align: left; }
    th { position: sticky; top: 0; background: #141a2e; z-index: 5; font-size: .92rem; }
    th button {
      all: unset; cursor: pointer; color: var(--text); font-weight: 700;
    }
    th button:hover { color: var(--accent); }
    tbody tr:hover { background: rgba(96,165,250,.08); }
    .player { display: flex; align-items: center; gap: 10px; min-width: 260px; }
    .thumb {
      width: 52px; height: 72px; border-radius: 10px; object-fit: cover;
      background: #0b1020; border: 1px solid var(--line); flex: 0 0 auto;
    }
    .name { font-weight: 700; }
    .muted { color: var(--muted); font-size: .9rem; }
    .pill {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 999px; padding: 4px 10px; font-size: .78rem; font-weight: 700;
      border: 1px solid var(--line); background: #10172b;
    }
    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }
    .cards { padding: 16px; display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); }
    .card {
      border: 1px solid var(--line); border-radius: 20px; background: #10172b; overflow: hidden;
    }
    .card img { width: 100%; aspect-ratio: 3 / 4; object-fit: cover; background: #0b1020; }
    .card .body { padding: 12px; }
    .row { display: flex; justify-content: space-between; gap: 12px; margin-top: 8px; }
    .tiny { font-size: .82rem; color: var(--muted); }
    .footer { color: var(--muted); text-align: center; padding: 20px 8px 30px; }
    .hidden { display: none !important; }
    .loading, .empty { padding: 30px; text-align: center; color: var(--muted); }
    @media (max-width: 1200px) {
      .grid2 { grid-template-columns: 1fr; }
      .controls-grid { grid-template-columns: 1fr 1fr; }
      .stats { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 760px) {
      .hero { position: static; flex-direction: column; align-items: stretch; }
      .controls-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .player { min-width: 220px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <h1>MLB The Show 26 Dashboard</h1>
        <p>Browse cards, images, market prices, and flip margins from your Show API CSV.</p>
      </div>
      <div class="actions">
        <a class="btn" href="./data/show_dataset_latest.csv" target="_blank" rel="noreferrer">Open latest CSV</a>
        <button class="btn primary" id="refreshBtn" type="button">Reload data</button>
      </div>
    </section>

    <div class="grid2">
      <section class="panel controls">
        <div class="controls-grid">
          <div class="field">
            <label for="search">Search</label>
            <input id="search" type="search" placeholder="Search player, team, quirks, series..." />
          </div>
          <div class="field">
            <label for="series">Series</label>
            <select id="series"><option value="">All series</option></select>
          </div>
          <div class="field">
            <label for="team">Team</label>
            <select id="team"><option value="">All teams</option></select>
          </div>
          <div class="field">
            <label for="rarity">Rarity</label>
            <select id="rarity"><option value="">All rarities</option></select>
          </div>
          <div class="field">
            <label for="position">Position</label>
            <select id="position"><option value="">All positions</option></select>
          </div>
          <div class="field">
            <label for="sortField">Sort by</label>
            <select id="sortField">
              <option value="ovr">OVR</option>
              <option value="name">Name</option>
              <option value="team">Team</option>
              <option value="series">Series</option>
              <option value="best_buy_price">Buy Price</option>
              <option value="best_sell_price">Sell Price</option>
              <option value="profit_after_tax">Profit</option>
              <option value="speed">Speed</option>
              <option value="contact_r">Contact R</option>
              <option value="power_r">Power R</option>
              <option value="k9_r">K/9 R</option>
            </select>
          </div>
          <div class="field">
            <label for="sortDir">Direction</label>
            <select id="sortDir">
              <option value="desc">Desc</option>
              <option value="asc">Asc</option>
            </select>
          </div>
          <div class="field">
            <label for="minProfit">Min profit</label>
            <input id="minProfit" type="number" placeholder="Min profit" />
          </div>
          <div class="field">
            <label for="minOvr">Min OVR</label>
            <input id="minOvr" type="number" placeholder="Min OVR" />
          </div>
        </div>
        <div class="checks">
          <label><input id="marketOnly" type="checkbox" /> Market only</label>
          <label><input id="profitableOnly" type="checkbox" /> Profitable only</label>
          <label><input id="showImages" type="checkbox" checked /> Show images</label>
          <label><input id="cardView" type="checkbox" /> Card view</label>
        </div>
      </section>

      <section class="panel stats" id="stats"></section>
    </div>

    <section class="panel" style="margin-top:16px;">
      <div id="status" class="loading">Loading <code>docs/data/show_dataset_latest.csv</code>...</div>
      <div class="table-wrap" id="tableWrap">
        <table id="table" class="hidden">
          <thead>
            <tr>
              <th><button data-sort="name">Player</button></th>
              <th><button data-sort="ovr">OVR</button></th>
              <th><button data-sort="series">Series</button></th>
              <th><button data-sort="rarity">Rarity</button></th>
              <th><button data-sort="team">Team</button></th>
              <th><button data-sort="display_position">Pos</button></th>
              <th><button data-sort="best_buy_price">Buy</button></th>
              <th><button data-sort="best_sell_price">Sell</button></th>
              <th><button data-sort="profit_after_tax">Profit</button></th>
              <th><button data-sort="contact_r">Con R</button></th>
              <th><button data-sort="power_r">Pow R</button></th>
              <th><button data-sort="speed">Speed</button></th>
              <th><button data-sort="k9_r">K/9 R</button></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div id="cards" class="cards hidden"></div>
      <div id="empty" class="empty hidden">No players matched your filters.</div>
    </section>

    <div class="footer">Built for GitHub Pages. Put this file in <code>docs/index.html</code>.</div>
  </div>

  <script>
    const DATA_PATH = './data/show_dataset_latest.csv';
    let rawRows = [];
    let filteredRows = [];

    const els = {
      search: document.getElementById('search'),
      series: document.getElementById('series'),
      team: document.getElementById('team'),
      rarity: document.getElementById('rarity'),
      position: document.getElementById('position'),
      sortField: document.getElementById('sortField'),
      sortDir: document.getElementById('sortDir'),
      minProfit: document.getElementById('minProfit'),
      minOvr: document.getElementById('minOvr'),
      marketOnly: document.getElementById('marketOnly'),
      profitableOnly: document.getElementById('profitableOnly'),
      showImages: document.getElementById('showImages'),
      cardView: document.getElementById('cardView'),
      refreshBtn: document.getElementById('refreshBtn'),
      stats: document.getElementById('stats'),
      status: document.getElementById('status'),
      table: document.getElementById('table'),
      tbody: document.getElementById('tbody'),
      cards: document.getElementById('cards'),
      empty: document.getElementById('empty')
    };

    const numberFields = new Set([
      'ovr','best_buy_price','best_sell_price','profit_after_tax','contact_r','power_r','speed','k9_r','buy_order_count','sell_order_count'
    ]);

    function toNum(v) {
      const n = Number(String(v ?? '').replace(/[$,]/g, '').trim());
      return Number.isFinite(n) ? n : 0;
    }

    function csvToRows(data) {
      return data.map(row => {
        const out = { ...row };
        for (const key of Object.keys(out)) {
          if (numberFields.has(key)) out[key] = toNum(out[key]);
        }
        return out;
      });
    }

    function uniq(rows, key) {
      return [...new Set(rows.map(r => (r[key] ?? '').toString().trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
    }

    function fillSelect(select, values) {
      const first = select.options[0]?.outerHTML || '<option value="">All</option>';
      select.innerHTML = first + values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
    }

    function escapeHtml(str='') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function formatNum(n) {
      return Number(n || 0).toLocaleString();
    }

    function renderStats(rows) {
      const market = rows.filter(r => toNum(r.best_buy_price) > 0 || toNum(r.best_sell_price) > 0);
      const profitable = rows.filter(r => toNum(r.profit_after_tax) > 0);
      const topProfit = profitable.reduce((m, r) => Math.max(m, toNum(r.profit_after_tax)), 0);
      const maxBuy = rows.reduce((m, r) => Math.max(m, toNum(r.best_buy_price)), 0);
      const avgOvr = rows.length ? (rows.reduce((s, r) => s + toNum(r.ovr), 0) / rows.length).toFixed(1) : '0.0';
      const diamonds = rows.filter(r => toNum(r.ovr) >= 85).length;
      const liveSeries = rows.filter(r => String(r.series || '').toLowerCase().includes('live')).length;

      const cards = [
        ['Visible cards', formatNum(rows.length)],
        ['Cards with market', formatNum(market.length)],
        ['Profitable flips', formatNum(profitable.length)],
        ['Top profit', `$${formatNum(topProfit)}`],
        ['Highest buy', `$${formatNum(maxBuy)}`],
        ['Avg OVR', avgOvr],
        ['Diamonds', formatNum(diamonds)],
        ['Live series', formatNum(liveSeries)],
      ];

      els.stats.innerHTML = cards.map(([k, v]) => `
        <div class="stat">
          <div class="k">${k}</div>
          <div class="v">${v}</div>
        </div>
      `).join('');
    }

    function applyFilters() {
      const q = els.search.value.trim().toLowerCase();
      const series = els.series.value;
      const team = els.team.value;
      const rarity = els.rarity.value;
      const position = els.position.value;
      const minProfit = toNum(els.minProfit.value);
      const minOvr = toNum(els.minOvr.value);

      filteredRows = rawRows.filter(r => {
        const hay = [r.name, r.team, r.series, r.rarity, r.display_position, r.quirks].join(' ').toLowerCase();
        if (q && !hay.includes(q)) return false;
        if (series && String(r.series || '') !== series) return false;
        if (team && String(r.team || '') !== team) return false;
        if (rarity && String(r.rarity || '') !== rarity) return false;
        if (position && String(r.display_position || '') !== position) return false;
        if (els.marketOnly.checked && !(toNum(r.best_buy_price) > 0 || toNum(r.best_sell_price) > 0)) return false;
        if (els.profitableOnly.checked && !(toNum(r.profit_after_tax) > 0)) return false;
        if (minProfit > 0 && toNum(r.profit_after_tax) < minProfit) return false;
        if (minOvr > 0 && toNum(r.ovr) < minOvr) return false;
        return true;
      });

      const field = els.sortField.value;
      const dir = els.sortDir.value === 'asc' ? 1 : -1;
      filteredRows.sort((a, b) => {
        const av = a[field] ?? '';
        const bv = b[field] ?? '';
        if (numberFields.has(field)) return (toNum(av) - toNum(bv)) * dir;
        return String(av).localeCompare(String(bv)) * dir;
      });

      renderStats(filteredRows);
      renderResults();
    }

    function rarityPill(r) {
      const val = String(r || 'Unknown');
      return `<span class="pill">${escapeHtml(val)}</span>`;
    }

    function profitClass(v) {
      const n = toNum(v);
      if (n > 0) return 'good';
      if (n < 0) return 'bad';
      return 'warn';
    }

    function imgTag(r, cls='thumb') {
      if (!els.showImages.checked) return '';
      const src = r.img || '';
      if (!src) return `<div class="${cls}" style="display:grid;place-items:center;color:var(--muted);">No img</div>`;
      return `<img class="${cls}" src="${escapeHtml(src)}" alt="${escapeHtml(r.name || 'card')}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">`;
    }

    function renderTable(rows) {
      els.tbody.innerHTML = rows.map(r => `
        <tr>
          <td>
            <div class="player">
              ${imgTag(r)}
              <div>
                <div class="name">${escapeHtml(r.name || '')}</div>
                <div class="muted">${escapeHtml(r.team || '')} · ${escapeHtml(r.display_position || '')}</div>
              </div>
            </div>
          </td>
          <td>${formatNum(r.ovr)}</td>
          <td>${escapeHtml(r.series || '')}</td>
          <td>${rarityPill(r.rarity)}</td>
          <td>${escapeHtml(r.team || '')}</td>
          <td>${escapeHtml(r.display_position || '')}</td>
          <td>$${formatNum(r.best_buy_price)}</td>
          <td>$${formatNum(r.best_sell_price)}</td>
          <td class="${profitClass(r.profit_after_tax)}">$${formatNum(r.profit_after_tax)}</td>
          <td>${formatNum(r.contact_r)}</td>
          <td>${formatNum(r.power_r)}</td>
          <td>${formatNum(r.speed)}</td>
          <td>${formatNum(r.k9_r)}</td>
        </tr>
      `).join('');
    }

    function renderCards(rows) {
      els.cards.innerHTML = rows.map(r => `
        <article class="card">
          ${imgTag(r, '')}
          <div class="body">
            <div class="name">${escapeHtml(r.name || '')}</div>
            <div class="tiny">${escapeHtml(r.team || '')} · ${escapeHtml(r.display_position || '')}</div>
            <div class="row"><span>${rarityPill(r.rarity)}</span><strong>${formatNum(r.ovr)} OVR</strong></div>
            <div class="row"><span class="tiny">Series</span><span>${escapeHtml(r.series || '')}</span></div>
            <div class="row"><span class="tiny">Buy</span><span>$${formatNum(r.best_buy_price)}</span></div>
            <div class="row"><span class="tiny">Sell</span><span>$${formatNum(r.best_sell_price)}</span></div>
            <div class="row"><span class="tiny">Profit</span><strong class="${profitClass(r.profit_after_tax)}">$${formatNum(r.profit_after_tax)}</strong></div>
            <div class="row"><span class="tiny">Con R / Pow R</span><span>${formatNum(r.contact_r)} / ${formatNum(r.power_r)}</span></div>
          </div>
        </article>
      `).join('');
    }

    function renderResults() {
      const rows = filteredRows;
      const useCards = els.cardView.checked;
      els.empty.classList.toggle('hidden', rows.length !== 0);
      els.table.classList.toggle('hidden', useCards || rows.length === 0);
      els.cards.classList.toggle('hidden', !useCards || rows.length === 0);
      if (rows.length === 0) return;
      if (useCards) renderCards(rows);
      else renderTable(rows);
    }

    async function loadData() {
      els.status.textContent = `Loading ${DATA_PATH}...`;
      els.status.classList.remove('hidden');
      els.table.classList.add('hidden');
      els.cards.classList.add('hidden');
      els.empty.classList.add('hidden');

      Papa.parse(DATA_PATH, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: ({ data }) => {
          rawRows = csvToRows(data);
          fillSelect(els.series, uniq(rawRows, 'series'));
          fillSelect(els.team, uniq(rawRows, 'team'));
          fillSelect(els.rarity, uniq(rawRows, 'rarity'));
          fillSelect(els.position, uniq(rawRows, 'display_position'));
          els.status.textContent = `Loaded ${formatNum(rawRows.length)} rows from show_dataset_latest.csv`;
          setTimeout(() => els.status.classList.add('hidden'), 900);
          applyFilters();
        },
        error: (err) => {
          els.status.classList.remove('hidden');
          els.status.innerHTML = `Could not load <code>${DATA_PATH}</code>. Make sure GitHub Pages is serving <code>docs/data/show_dataset_latest.csv</code>.<br><br>${escapeHtml(err.message || String(err))}`;
        }
      });
    }

    for (const el of Object.values(els)) {
      if (el && ['INPUT','SELECT'].includes(el.tagName)) {
        el.addEventListener('input', applyFilters);
        el.addEventListener('change', applyFilters);
      }
    }

    document.querySelectorAll('th button[data-sort]').forEach(btn => {
      btn.addEventListener('click', () => {
        const field = btn.dataset.sort;
        if (els.sortField.value === field) {
          els.sortDir.value = els.sortDir.value === 'asc' ? 'desc' : 'asc';
        } else {
          els.sortField.value = field;
        }
        applyFilters();
      });
    });

    els.refreshBtn.addEventListener('click', loadData);
    loadData();
  </script>
</body>
</html>
