<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting — ShowField</title>
  <meta http-equiv="refresh" content="0; url=./players.html" />
  <style>
    :root{--bg:#05080f;--panel:#101829;--line:rgba(255,255,255,.07);--text:#e8edf8;--muted:#7a8aaa;--red:#e03030;--red2:#ff4545}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .card{max-width:560px;margin:24px;padding:28px;border:1px solid var(--line);border-radius:24px;background:var(--panel);text-align:center}
    h1{margin:0 0 10px;font-size:2rem}
    p{margin:0 0 16px;color:var(--muted);line-height:1.6}
    a{display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:999px;background:var(--red);color:#fff;text-decoration:none;font-weight:700}
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red2);box-shadow:0 0 8px var(--red2);margin-right:8px}
  </style>
  <script>window.location.replace('./players.html');</script>
</head>
<body>
  <div class="card">
    <h1><span class="dot"></span>ShowField</h1>
    <p>The old dashboard route now lives under the unified Players page.</p>
    <a href="./players.html">Open Players</a>
  </div>
</body>
</html>
